services:
  - type: web
    name: tarie-ia
    runtime: python
    rootDir: web
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade head
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /opt/render/project/src/web/static/uploads
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: AMBIENTE
        value: production
      - key: REVISOR_REALTIME_BACKEND
        value: redis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: tarie-ia-realtime
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: tarie-ia-db
          property: connectionString
      - key: PASTA_UPLOADS_PERFIS
        value: /opt/render/project/src/web/static/uploads/perfis
      - key: PASTA_ANEXOS_MESA
        value: /opt/render/project/src/web/static/uploads/mesa_anexos
      - key: CHAVE_SECRETA_APP
        sync: false
      - key: CHAVE_API_GEMINI
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NOME
        value: Administrador Tariel.ia
      - key: BOOTSTRAP_EMPRESA_NOME
        value: Tariel.ia
      - key: BOOTSTRAP_EMPRESA_CNPJ
        value: "11111111111111"
      - key: SESSION_COOKIE_NAME
        value: cracha_tariel_seguro
      - key: SEED_DEV_BOOTSTRAP
        value: "0"

  - type: keyvalue
    name: tarie-ia-realtime
    region: oregon
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: tarie-ia-db
    plan: basic-1gb
    diskSizeGB: 15
    storageAutoscalingEnabled: false
