services:
  - type: web
    name: tarie-ia
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    preDeployCommand: python -m alembic upgrade head
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /opt/render/project/src/static/uploads
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: AMBIENTE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tarie-ia-db
          property: connectionString
      - key: PASTA_UPLOADS_PERFIS
        value: /opt/render/project/src/static/uploads/perfis
      - key: PASTA_ANEXOS_MESA
        value: /opt/render/project/src/static/uploads/mesa_anexos
      - key: CHAVE_SECRETA_APP
        sync: false
      - key: CHAVE_API_GEMINI
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: APP_HOST_PUBLICO
        sync: false
      - key: SESSION_COOKIE_NAME
        value: cracha_tariel_seguro
      - key: SEED_DEV_BOOTSTRAP
        value: "0"

databases:
  - name: tarie-ia-db
    plan: basic-1gb
    diskSizeGB: 15
    storageAutoscalingEnabled: false
