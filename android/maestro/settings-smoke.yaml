appId: com.tarielia.inspetor
tags:
  - smoke
  - settings
env:
  LOGIN_EMAIL: ${MAESTRO_LOGIN_EMAIL}
  LOGIN_PASSWORD: ${MAESTRO_LOGIN_PASSWORD}
---
- launchApp:
    clearState: true

- runFlow:
    when:
      visible:
        id: login-email-input
    commands:
      - tapOn:
          id: login-email-input
      - inputText: ${LOGIN_EMAIL}
      - tapOn:
          id: login-password-input
      - inputText: ${LOGIN_PASSWORD}
      - hideKeyboard
      - tapOn:
          id: login-submit-button

- extendedWaitUntil:
    visible:
      id: open-settings-button
    timeout: 20000

- tapOn:
    id: open-settings-button

- assertVisible:
    id: settings-drawer

- assertVisible:
    id: settings-print-personalizacao-row

- tapOn:
    id: settings-print-personalizacao-row

- extendedWaitUntil:
    visible:
      id: settings-section-link-preferenciasIa
    timeout: 10000

- tapOn:
    id: settings-section-link-preferenciasIa

- extendedWaitUntil:
    visible:
      id: settings-ai-model-row
    timeout: 10000

- tapOn:
    id: settings-ai-model-row

- extendedWaitUntil:
    visible:
      id: settings-sheet-modal
    timeout: 10000

- assertVisible:
    id: settings-ai-model-option-avancado

- tapOn:
    id: settings-ai-model-option-avancado

- extendedWaitUntil:
    visible:
      id: settings-ai-model-row
    timeout: 10000

- tapOn:
    id: settings-drawer-back-button

- runFlow:
    when:
      visible:
        id: settings-section-link-preferenciasIa
    commands:
      - tapOn:
          id: settings-drawer-back-button

- extendedWaitUntil:
    visible:
      id: settings-print-personalizacao-row
    timeout: 10000

- scrollUntilVisible:
    element:
      id: settings-print-seguranca-row
    direction: DOWN
    timeout: 10000

- tapOn:
    id: settings-print-seguranca-row

- scrollUntilVisible:
    element:
      id: settings-section-link-twofa
    direction: UP
    timeout: 10000

- tapOn:
    id: settings-section-link-twofa

- extendedWaitUntil:
    visible:
      id: settings-section-twofa
    timeout: 10000

- tapOn:
    id: settings-twofa-method-row

- runFlow:
    when:
      visible:
        id: settings-drawer-back-button
    commands:
      - tapOn:
          id: settings-drawer-back-button

- extendedWaitUntil:
    visible:
      id: settings-section-link-twofa
    timeout: 10000

- tapOn:
    id: settings-drawer-back-button

- extendedWaitUntil:
    visible:
      id: settings-print-personalizacao-row
    timeout: 10000

- scrollUntilVisible:
    element:
      id: settings-print-aparencia-row
    direction: DOWN
    timeout: 10000

- tapOn:
    id: settings-print-aparencia-row

- extendedWaitUntil:
    visible:
      id: settings-section-link-aparencia
    timeout: 10000

- tapOn:
    id: settings-section-link-aparencia

- assertVisible:
    text: "Aparência"

- tapOn:
    text: "Tema"

- tapOn:
    id: settings-drawer-back-button

- extendedWaitUntil:
    visible:
      id: settings-section-link-aparencia
    timeout: 10000

- tapOn:
    id: settings-drawer-back-button

- extendedWaitUntil:
    visible:
      id: close-settings-drawer-button
    timeout: 10000

- scrollUntilVisible:
    element:
      id: settings-print-sobre-row
    direction: DOWN
    visibilityPercentage: 70
    timeout: 10000

- tapOn:
    id: settings-print-sobre-row

- extendedWaitUntil:
    visible:
      id: settings-section-link-suporte
    timeout: 10000

- tapOn:
    id: settings-section-link-suporte

- assertVisible:
    id: settings-section-suporte

- scrollUntilVisible:
    element:
      id: settings-support-privacy-row
    direction: DOWN
    timeout: 10000

- tapOn:
    id: settings-support-privacy-row

- assertVisible:
    text: "Política de privacidade"

- tapOn:
    id: settings-sheet-close-button

- runFlow:
    when:
      visible:
        id: settings-sheet-modal
    commands:
      - tapOn:
          id: settings-sheet-footer-close-button

- tapOn:
    id: settings-drawer-back-button

- runFlow:
    when:
      visible:
        id: settings-drawer-back-button
    commands:
      - tapOn:
          id: settings-drawer-back-button

- extendedWaitUntil:
    visible:
      id: close-settings-drawer-button
    timeout: 8000

- tapOn:
    id: close-settings-drawer-button

- assertVisible:
    id: chat-tab-button
