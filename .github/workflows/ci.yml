name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: web/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Ruff check
        run: python -m ruff check .

      - name: Architecture guard (chat)
        run: python scripts/check_chat_architecture.py

      - name: Critical pytest suite
        run: |
          PYTHONPATH=. python -m pytest -q \
            tests/test_smoke.py \
            tests/test_regras_rotas_criticas.py \
            tests/test_inspetor_comandos_dominio.py \
            tests/test_inspetor_confianca_dominio.py

  mobile-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: android/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Jest
        run: npm run test -- --runInBand
