<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Nova Empresa Assinante • Tariel.ia</title>
    <link rel="icon" href="/static/img/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style nonce="{{ csp_nonce }}">
        :root { color-scheme: dark; --bg:#0d1319; --surface:#121a23; --text:#eef3f8; --soft:#aab7c5; --border:rgba(208,217,230,.14); --accent:#f47b20; }
        * { box-sizing:border-box; } body { margin:0; background:linear-gradient(180deg,#0b1015,#0d1319); color:var(--text); font-family:"IBM Plex Sans",sans-serif; }
        main { max-width:1040px; margin:0 auto; padding:28px 18px 40px; } h1 { margin:0 0 8px; font-size:32px; } p { color:var(--soft); margin:0 0 22px; }
        .box { padding:20px; border:1px solid var(--border); border-radius:18px; background:rgba(18,26,35,.94); box-shadow:0 24px 60px rgba(0,0,0,.28); }
        .grid { display:grid; gap:14px; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); } label { display:grid; gap:7px; color:var(--soft); font-size:13px; font-weight:600; } input,select,textarea { width:100%; min-height:44px; padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:rgba(8,13,18,.45); color:var(--text); font:inherit; } textarea { min-height:120px; resize:vertical; }
        .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; } .btn { min-height:44px; padding:10px 16px; border-radius:12px; border:1px solid var(--border); background:rgba(255,255,255,.03); color:var(--text); text-decoration:none; cursor:pointer; font:inherit; }
        .btn.primary { border:none; background:linear-gradient(180deg,#f47b20,#cc6211); color:#fff; font-weight:700; }
    </style>
</head>
<body>
    <main>
        <h1>Provisionar empresa assinante</h1>
        <p>O <strong>admin-ceo</strong> cria a empresa e provisiona o primeiro <strong>admin-cliente</strong>. A senha inicial é temporária e deverá ser trocada no primeiro acesso.</p>

        <form method="post" action="/admin/novo-cliente" class="box">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="grid">
                <label>Nome da empresa<input name="nome" required></label>
                <label>CNPJ<input name="cnpj" required></label>
                <label>Plano<select name="plano"><option value="Inicial">Inicial</option><option value="Intermediario">Intermediario</option><option value="Ilimitado">Ilimitado</option></select></label>
                <label>E-mail do primeiro admin-cliente<input name="email" type="email" required></label>
                <label>Segmento<input name="segmento"></label>
                <label>Cidade / Estado<input name="cidade_estado"></label>
                <label>Responsável<input name="nome_responsavel"></label>
                <label style="grid-column:1/-1;">Observações<textarea name="observacoes"></textarea></label>
            </div>
            <div class="actions">
                <button class="btn primary" type="submit">Criar empresa e primeiro admin-cliente</button>
                <a class="btn" href="/admin/clientes">Voltar para empresas</a>
            </div>
        </form>
    </main>
</body>
</html>
