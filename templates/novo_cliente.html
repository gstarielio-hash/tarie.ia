<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#171A20">
    <meta name="robots" content="noindex, nofollow">
    <meta name="referrer" content="no-referrer">

    <title>Login Corporativo • Tariel Control</title>

    <link rel="icon" href="/static/img/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet">

    <style nonce="{{ csp_nonce }}">
        :root {
            --bg-body: #171A20;
            --bg-card: #23272F;
            --bg-card-2: #1D2128;
            --bg-input: #2B3038;
            --bg-input-focus: #343A44;
            --text-primary: #ECEFF4;
            --text-secondary: #BDC5D0;
            --text-muted: rgba(189, 197, 208, 0.72);
            --text-soft: rgba(189, 197, 208, 0.52);
            --accent: #F47B20;
            --accent-hover: #D86815;
            --danger: #FF8A8A;
            --danger-border: rgba(255, 77, 77, 0.45);
            --danger-bg: rgba(255, 77, 77, 0.15);
            --warning: #F47B20;
            --warning-bg: rgba(244, 123, 32, 0.12);
            --warning-border: rgba(244, 123, 32, 0.35);
            --success-border: rgba(72, 199, 142, 0.6);
            --border-soft: rgba(191, 198, 209, 0.14);
            --border-input: rgba(191, 198, 209, 0.24);
            --radius-sm: 8px;
            --radius-md: 14px;
            --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.5);
            --focus-ring: 0 0 0 3px rgba(244, 123, 32, 0.22);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            display: grid;
            place-items: center;
            min-height: 100svh;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(244, 123, 32, 0.08), transparent 28%),
                var(--bg-body);
            color: var(--text-primary);
            font-family: "Inter", "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 430px;
            margin: 16px;
            padding: 38px 32px 28px;
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-md);
            background: linear-gradient(180deg, rgba(38, 43, 52, 0.98), rgba(28, 32, 39, 0.98));
            box-shadow: var(--shadow-card);
            animation: fadeIn .35s ease;
            backdrop-filter: blur(8px);
        }

        .logo-area {
            margin-bottom: 28px;
            text-align: center;
        }

        .logo-area .icone {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 68px;
            height: 68px;
            border-radius: 18px;
            background: rgba(244, 123, 32, 0.12);
            color: var(--accent);
            font-size: 38px;
        }

        .logo-area h1 {
            margin: 14px 0 6px;
            font-size: 24px;
            font-weight: 700;
        }

        .logo-area p {
            margin: 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .badge-dev,
        .aviso-msg,
        .erro-msg {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: var(--radius-sm);
            text-align: center;
        }

        .badge-dev {
            display: none;
            margin-bottom: 16px;
            padding: 8px 12px;
            border: 1px solid rgba(244, 123, 32, 0.3);
            background: rgba(244, 123, 32, 0.15);
            color: var(--warning);
            font-size: 12px;
        }

        .aviso-msg {
            display: none;
            margin-bottom: 16px;
            padding: 10px 12px;
            border: 1px solid var(--warning-border);
            background: var(--warning-bg);
            color: var(--warning);
            font-size: 12px;
        }

        .erro-msg {
            margin-bottom: 20px;
            padding: 12px 14px;
            border: 1px solid var(--danger-border);
            background: var(--danger-bg);
            color: var(--danger);
            font-size: 13px;
        }

        .form-login {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .input-group label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .campo-wrapper {
            position: relative;
        }

        .campo-icone {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 19px;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            min-height: 50px;
            padding: 12px 15px 12px 44px;
            border: 1px solid var(--border-input);
            border-radius: var(--radius-sm);
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-primary);
            font: inherit;
            font-size: 15px;
            outline: none;
            transition: border-color .2s ease, background-color .2s ease, box-shadow .2s ease;
        }

        .form-control::placeholder {
            color: rgba(189, 197, 208, 0.5);
        }

        .form-control:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.32);
            box-shadow: var(--focus-ring);
        }

        .form-control.invalido {
            border-color: var(--danger-border);
        }

        .form-control.valido {
            border-color: var(--success-border);
        }

        .form-control:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 50px var(--bg-card) inset;
            -webkit-text-fill-color: var(--text-primary);
        }

        .senha-wrapper {
            position: relative;
        }

        .senha-wrapper .form-control {
            padding-right: 48px;
        }

        .btn-toggle-senha {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            padding: 0;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color .2s ease, background-color .2s ease;
        }

        .btn-toggle-senha:hover {
            color: var(--accent);
            background: rgba(255, 255, 255, 0.04);
        }

        .btn-toggle-senha .material-symbols-rounded {
            font-size: 20px;
        }

        .msg-campo {
            min-height: 16px;
            padding-left: 2px;
            font-size: 11px;
            line-height: 1.35;
        }

        .msg-campo.erro {
            color: var(--danger);
        }

        .msg-campo.aviso {
            color: var(--warning);
        }

        .btn-login {
            width: 100%;
            min-height: 50px;
            margin-top: 4px;
            padding: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: #fff;
            font: inherit;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color .2s ease, transform .15s ease, opacity .2s ease;
        }

        .btn-login:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-login:disabled {
            opacity: .7;
            cursor: not-allowed;
            transform: none;
        }

        .rodape-login {
            margin-top: 22px;
            text-align: center;
            color: var(--text-soft);
            font-size: 12px;
            line-height: 1.5;
        }

        .rodape-login strong {
            color: var(--text-muted);
        }

        .btn-toggle-senha:focus-visible,
        .btn-login:focus-visible,
        .form-control:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .login-container {
                min-height: 100svh;
                max-width: none;
                margin: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                border: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body data-login-ok="{{ '1' if login_sucesso else '0' }}" data-login-erro="{{ '1' if erro else '0' }}">
    <main class="login-container" aria-label="Formulário de acesso corporativo">
        <header class="logo-area">
            <span class="material-symbols-rounded icone" aria-hidden="true">shield_person</span>
            <h1>Acesso Restrito</h1>
            <p>Portal da Diretoria WF Engenharia</p>
        </header>

        <div class="badge-dev" id="badge-dev" aria-live="polite">
            <span class="material-symbols-rounded" aria-hidden="true" style="font-size:16px;">code</span>
            Modo dev — credenciais preenchidas automaticamente
        </div>

        <div class="aviso-msg" id="aviso-rate" role="alert" aria-live="assertive"></div>

        {% if erro %}
        <div class="erro-msg" role="alert" aria-live="assertive">
            <span class="material-symbols-rounded" aria-hidden="true" style="font-size:16px;">error</span>
            {{ erro | e }}
        </div>
        {% endif %}

        <form action="/admin/login" method="POST" id="form-login" class="form-login" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="input-group">
                <label for="email">E-mail corporativo</label>
                <div class="campo-wrapper">
                    <span class="material-symbols-rounded campo-icone" aria-hidden="true">mail</span>
                    <input type="email" id="email" name="email" class="form-control" required
                        placeholder="diretoria@wf.com.br" autocomplete="username" inputmode="email" spellcheck="false"
                        autocapitalize="off" aria-describedby="msg-email" autocomplete="username">
                </div>
                <span class="msg-campo" id="msg-email" aria-live="polite"></span>
            </div>

            <div class="input-group">
                <label for="senha">Senha de acesso</label>
                <div class="senha-wrapper">
                    <span class="material-symbols-rounded campo-icone" aria-hidden="true">lock</span>
                    <input type="password" id="senha" name="senha" class="form-control" required minlength="8"
                        placeholder="••••••••" autocomplete="current-password" aria-describedby="msg-senha" autocomplete="current-password">
                    <button type="button" class="btn-toggle-senha" id="btn-toggle-senha" aria-label="Mostrar senha"
                        aria-pressed="false">
                        <span class="material-symbols-rounded" id="icone-toggle" aria-hidden="true">visibility</span>
                    </button>
                </div>
                <span class="msg-campo" id="msg-senha" aria-live="polite"></span>
            </div>

            <button type="submit" class="btn-login" id="btn-login">
                <span class="material-symbols-rounded" aria-hidden="true">login</span>
                <span>Autenticar Sistema</span>
            </button>
        </form>

        <p class="rodape-login">
            Acesso restrito a membros da<br>
            <strong>Diretoria WF Engenharia</strong>
        </p>
    </main>

    <script nonce="{{ csp_nonce }}">
        (() => {
            "use strict";

            const DEV_HOSTS = new Set(["localhost", "127.0.0.1"]);
            const LIMITE_TENTATIVAS = 3;
            const BLOQUEIO_MS = 30_000;
            const LS_KEY = "wf_admin_login_rate_v2";
            const SS_PENDING_KEY = "wf_admin_login_pending";

            const body = document.body;
            const form = document.getElementById("form-login");
            const emailInput = document.getElementById("email");
            const senhaInput = document.getElementById("senha");
            const msgEmail = document.getElementById("msg-email");
            const msgSenha = document.getElementById("msg-senha");
            const btnLogin = document.getElementById("btn-login");
            const avisoRate = document.getElementById("aviso-rate");
            const badgeDev = document.getElementById("badge-dev");
            const btnToggle = document.getElementById("btn-toggle-senha");
            const iconeToggle = document.getElementById("icone-toggle");

            let capsLockAtivo = false;
            let timerBloqueio = null;

            const htmlBotaoPadrao =
                '<span class="material-symbols-rounded" aria-hidden="true">login</span><span>Autenticar Sistema</span>';

            const htmlBotaoCarregando =
                '<span class="material-symbols-rounded" aria-hidden="true" style="animation:spin 1s linear infinite;">sync</span><span>Verificando...</span>';

            const carregarEstado = () => {
                try {
                    return JSON.parse(localStorage.getItem(LS_KEY)) || { count: 0, desde: 0 };
                } catch {
                    return { count: 0, desde: 0 };
                }
            };

            const salvarEstado = (estado) => {
                localStorage.setItem(LS_KEY, JSON.stringify(estado));
            };

            const limparEstado = () => {
                salvarEstado({ count: 0, desde: 0 });
            };

            const marcarTentativaPendente = () => {
                sessionStorage.setItem(SS_PENDING_KEY, "1");
            };

            const limparTentativaPendente = () => {
                sessionStorage.removeItem(SS_PENDING_KEY);
            };

            const houveTentativaPendente = () => sessionStorage.getItem(SS_PENDING_KEY) === "1";

            const validarEmail = (valor) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(valor.trim());

            const setMensagem = (elMsg, texto = "", tipo = "") => {
                elMsg.textContent = texto;
                elMsg.className = tipo ? `msg-campo ${tipo}` : "msg-campo";
            };

            const limparEstadoCampo = (input, elMsg) => {
                input.classList.remove("invalido", "valido");
                input.removeAttribute("aria-invalid");
                if (elMsg && !capsLockAtivo) {
                    setMensagem(elMsg);
                }
            };

            const marcarErroCampo = (input, elMsg, mensagem) => {
                input.classList.remove("valido");
                input.classList.add("invalido");
                input.setAttribute("aria-invalid", "true");
                setMensagem(elMsg, mensagem, "erro");
            };

            const marcarValidoCampo = (input, elMsg) => {
                input.classList.remove("invalido");
                input.classList.add("valido");
                input.removeAttribute("aria-invalid");
                if (elMsg && !capsLockAtivo) {
                    setMensagem(elMsg);
                }
            };

            const atualizarMensagemSenha = () => {
                if (capsLockAtivo) {
                    setMensagem(msgSenha, "Caps Lock ativado.", "aviso");
                    return;
                }

                if (!senhaInput.value) {
                    setMensagem(msgSenha);
                    return;
                }

                if (senhaInput.value.length < 8) {
                    setMensagem(msgSenha, "A senha deve ter ao menos 8 caracteres.", "erro");
                    return;
                }

                setMensagem(msgSenha);
            };

            const validarCampos = () => {
                let ok = true;

                if (!emailInput.value.trim()) {
                    marcarErroCampo(emailInput, msgEmail, "Informe o e-mail corporativo.");
                    ok = false;
                } else if (!validarEmail(emailInput.value)) {
                    marcarErroCampo(emailInput, msgEmail, "Formato de e-mail inválido.");
                    ok = false;
                } else {
                    marcarValidoCampo(emailInput, msgEmail);
                }

                if (!senhaInput.value) {
                    marcarErroCampo(senhaInput, msgSenha, "Informe a senha de acesso.");
                    ok = false;
                } else if (senhaInput.value.length < 8) {
                    marcarErroCampo(senhaInput, msgSenha, "Senha inválida.");
                    ok = false;
                } else {
                    marcarValidoCampo(senhaInput, msgSenha);
                    atualizarMensagemSenha();
                }

                return ok;
            };

            const resetarBotao = () => {
                btnLogin.disabled = false;
                btnLogin.innerHTML = htmlBotaoPadrao;
                btnLogin.removeAttribute("aria-busy");
            };

            const setBotaoCarregando = () => {
                btnLogin.disabled = true;
                btnLogin.setAttribute("aria-busy", "true");
                btnLogin.innerHTML = htmlBotaoCarregando;
            };

            const ativarBloqueio = (estado) => {
                clearInterval(timerBloqueio);
                btnLogin.disabled = true;

                timerBloqueio = setInterval(() => {
                    const restante = BLOQUEIO_MS - (Date.now() - estado.desde);

                    if (restante <= 0) {
                        clearInterval(timerBloqueio);
                        avisoRate.style.display = "none";
                        limparEstado();
                        resetarBotao();
                        return;
                    }

                    const seg = Math.ceil(restante / 1000);
                    avisoRate.style.display = "flex";
                    avisoRate.innerHTML =
                        `<span class="material-symbols-rounded" aria-hidden="true" style="font-size:15px;">timer</span>` +
                        `<span>Muitas tentativas. Aguarde ${seg}s para tentar novamente.</span>`;

                    btnLogin.innerHTML =
                        `<span class="material-symbols-rounded" aria-hidden="true" style="animation:spin 1s linear infinite;">sync</span>` +
                        `<span>Bloqueado (${seg}s)</span>`;
                }, 500);
            };

            const verificarBloqueio = () => {
                const estado = carregarEstado();
                if (estado.count < LIMITE_TENTATIVAS) return false;

                const restante = BLOQUEIO_MS - (Date.now() - estado.desde);
                if (restante <= 0) {
                    limparEstado();
                    avisoRate.style.display = "none";
                    resetarBotao();
                    return false;
                }

                ativarBloqueio(estado);
                return true;
            };

            const registrarFalhaRecente = () => {
                const estado = carregarEstado();
                const agora = Date.now();

                if (!estado.count || agora - estado.desde > BLOQUEIO_MS) {
                    salvarEstado({ count: 1, desde: agora });
                    return;
                }

                salvarEstado({
                    count: estado.count + 1,
                    desde: estado.desde
                });
            };

            if (DEV_HOSTS.has(location.hostname)) {
                emailInput.value = "admin@wf.com.br";
                senhaInput.value = "Admin@2026";
                badgeDev.style.display = "flex";
            }

            if (body.dataset.loginOk === "1") {
                limparEstado();
                limparTentativaPendente();
            } else if (body.dataset.loginErro === "1" && houveTentativaPendente()) {
                registrarFalhaRecente();
                limparTentativaPendente();
            } else {
                limparTentativaPendente();
            }

            verificarBloqueio();

            btnToggle?.addEventListener("click", () => {
                const visivel = senhaInput.type === "text";
                senhaInput.type = visivel ? "password" : "text";
                iconeToggle.textContent = visivel ? "visibility" : "visibility_off";
                btnToggle.setAttribute("aria-label", visivel ? "Mostrar senha" : "Ocultar senha");
                btnToggle.setAttribute("aria-pressed", String(!visivel));
                senhaInput.focus();
            });

            const detectarCapsLock = (event) => {
                capsLockAtivo = !!(event.getModifierState && event.getModifierState("CapsLock"));
                atualizarMensagemSenha();
            };

            senhaInput.addEventListener("keydown", detectarCapsLock);
            senhaInput.addEventListener("keyup", detectarCapsLock);
            senhaInput.addEventListener("blur", () => {
                capsLockAtivo = false;
                atualizarMensagemSenha();
            });

            emailInput.addEventListener("input", () => {
                limparEstadoCampo(emailInput, msgEmail);
            });

            senhaInput.addEventListener("input", () => {
                senhaInput.classList.remove("invalido", "valido");
                senhaInput.removeAttribute("aria-invalid");
                atualizarMensagemSenha();
            });

            emailInput.addEventListener("blur", () => {
                if (!emailInput.value.trim()) {
                    marcarErroCampo(emailInput, msgEmail, "Informe o e-mail corporativo.");
                    return;
                }

                if (!validarEmail(emailInput.value)) {
                    marcarErroCampo(emailInput, msgEmail, "Formato de e-mail inválido.");
                    return;
                }

                marcarValidoCampo(emailInput, msgEmail);
            });

            senhaInput.addEventListener("blur", () => {
                if (!senhaInput.value) {
                    marcarErroCampo(senhaInput, msgSenha, "Informe a senha de acesso.");
                    return;
                }

                if (senhaInput.value.length < 8) {
                    marcarErroCampo(senhaInput, msgSenha, "A senha deve ter ao menos 8 caracteres.");
                    return;
                }

                marcarValidoCampo(senhaInput, msgSenha);
                atualizarMensagemSenha();
            });

            form.addEventListener("submit", (event) => {
                if (verificarBloqueio()) {
                    event.preventDefault();
                    return;
                }

                if (!validarCampos()) {
                    event.preventDefault();
                    const primeiroInvalido = form.querySelector(".form-control.invalido");
                    primeiroInvalido?.focus();
                    return;
                }

                marcarTentativaPendente();
                setBotaoCarregando();
            });
        })();
    </script>
</body>

</html>
