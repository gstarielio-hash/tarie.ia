<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo_pagina | default("Troca de Senha") | e }}</title>
    <style>
        :root {
            --bg: #0b1d2e;
            --card: #10283f;
            --borda: #1d4064;
            --texto: #e8f0f7;
            --muted: #9ab0c6;
            --erro-bg: #3a1414;
            --erro-borda: #b23c3c;
            --erro-txt: #ffd1d1;
            --ok: #f47b20;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top, #153554 0%, var(--bg) 60%);
            color: var(--texto);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            width: min(100%, 480px);
            background: var(--card);
            border: 1px solid var(--borda);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
        }

        p {
            margin: 8px 0 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .erro {
            margin-top: 14px;
            padding: 10px 12px;
            border: 1px solid var(--erro-borda);
            background: var(--erro-bg);
            color: var(--erro-txt);
            border-radius: 10px;
            font-size: 0.92rem;
        }

        form {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        label {
            font-size: 0.92rem;
            color: var(--muted);
            display: grid;
            gap: 6px;
        }

        input[type="password"] {
            width: 100%;
            border: 1px solid var(--borda);
            border-radius: 10px;
            background: #0a1e31;
            color: var(--texto);
            padding: 10px 12px;
            font-size: 0.98rem;
        }

        input[type="password"]:focus-visible {
            outline: 2px solid var(--ok);
            outline-offset: 1px;
        }

        .acoes {
            margin-top: 4px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            background: var(--ok);
            color: #0b1d2e;
            font-weight: 700;
            cursor: pointer;
        }

        a {
            align-self: center;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        a:hover {
            color: #cde1f4;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>{{ titulo_pagina | default("Troca de Senha") | e }}</h1>
        <p>{{ subtitulo_pagina | default("Atualize sua senha para continuar.") | e }}</p>

        {% if erro %}
        <div class="erro" role="alert" aria-live="assertive">{{ erro | e }}</div>
        {% endif %}

        <form method="post" action="{{ acao_form | e }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token | e }}">

            <label for="senha_atual">
                Senha temporária
                <input id="senha_atual" name="senha_atual" type="password" autocomplete="current-password" required>
            </label>

            <label for="nova_senha">
                Nova senha
                <input id="nova_senha" name="nova_senha" type="password" autocomplete="new-password" required>
            </label>

            <label for="confirmar_senha">
                Confirmar nova senha
                <input id="confirmar_senha" name="confirmar_senha" type="password" autocomplete="new-password" required>
            </label>

            <div class="acoes">
                <button type="submit">Atualizar senha</button>
                <a href="{{ rota_login | e }}">Voltar para login</a>
            </div>
        </form>
    </section>
</body>
</html>
